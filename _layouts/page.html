<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/images/Favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        padding: 2.5rem 1.25rem;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background-image: radial-gradient(circle at 20% 20%, rgba(245, 131, 182, 0.25), transparent 40%), radial-gradient(circle at 80% 0%, rgba(120, 70, 180, 0.35), transparent 35%), url("{{ '/images/bg.jpg' | relative_url }}");
        background-size: cover;
        background-attachment: fixed;
      }

      .page-shell {
        width: min(100%, 850px);
        background: rgba(108, 63, 138, 0.82);
        border-radius: 0.45rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 0.75rem 2rem rgba(24, 12, 35, 0.4);
        backdrop-filter: blur(3px);
      }

      .page-inner {
        padding: 2.4rem;
      }

      .close-link {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.25rem;
        height: 2.25rem;
        line-height: 2.25rem;
        border-radius: 999px;
        text-align: center;
        text-decoration: none;
        border-bottom: 0;
        background: rgba(81, 43, 127, 0.8);
        color: rgba(255, 255, 255, 0.85);
      }

      .page-top {
        position: relative;
      }

      .hero {
        margin: 0 0 1.8rem;
      }

      .hero img {
        width: 100%;
        border-radius: 0.25rem;
        display: block;
      }

      .hero h1 {
        margin-top: 1rem;
        text-align: center;
        letter-spacing: 0.14rem;
      }

      nav ul {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        justify-content: center;
        list-style: none;
        padding: 0;
        margin: 0 0 1.2rem;
      }

      nav a {
        border-bottom: none;
        padding: 0.2rem 0.7rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .toc {
        background: rgba(238, 162, 214, 0.23);
        padding: 0.95rem;
        border-radius: 0.3rem;
      }

      .article-block {
        margin-top: 1.25rem;
        padding: 1rem;
        border-radius: 0.25rem;
        background: rgba(231, 161, 217, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .article-block h2 {
        margin-bottom: 0.55rem;
      }

      .article-cover {
        margin: 0 0 1rem;
      }

      .article-cover img {
        width: 100%;
        display: block;
        border-radius: 0.2rem;
      }

      .article-link {
        font-size: 0.9rem;
        opacity: 0.85;
      }

      @media (max-width: 640px) {
        .page-inner {
          padding: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="page-inner">
        <div class="page-top">
          <a class="close-link" href="{{ '/' | relative_url }}" aria-label="Back to home">×</a>
          {% include nav.html %}
          <header class="hero">
            {% if page.hero_image %}
              <img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
            {% endif %}
            <h1>{{ page.title }}</h1>
          </header>
        </div>
        {{ content }}
      </div>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="{{ '/images/Favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <noscript><link rel="stylesheet" href="{{ '/assets/css/noscript.css' | relative_url }}" /></noscript>
    <script>
      (() => {
        try {
          if (!document.referrer) return;

          const referrerUrl = new URL(document.referrer);
          if (referrerUrl.origin !== window.location.origin) return;

          const homeUrl = new URL("{{ '/' | relative_url }}", window.location.origin);
          const homeIndexUrl = new URL("index.html", homeUrl);
          const normalizePath = (value) => value.replace(/\/+$/, "") || "/";
          const normalizedReferrerPath = normalizePath(referrerUrl.pathname);
          const isHomeReferrer =
            normalizedReferrerPath === normalizePath(homeUrl.pathname) ||
            normalizedReferrerPath === normalizePath(homeIndexUrl.pathname);

          if (isHomeReferrer) {
            document.documentElement.classList.add("morph-enter");
          }
        } catch (error) {
        }
      })();
    </script>
    <style>
      #header {
        margin-top: 0;
      }

      #header > * {
        margin-top: 2rem;
      }

      #header > *:before {
        top: calc(-2rem - 1px);
        height: calc(2rem + 1px);
      }

      #header .content .inner {
        padding: 1.5rem 1.75rem;
      }

      #header .content p {
        margin: 0;
      }

      #main {
        width: 100%;
        margin-top: 2rem;
      }

      #main article {
        width: min(100%, 56rem);
        margin: 0 auto;
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1), filter 0.45s ease;
        transform-origin: center top;
      }

      html.morph-enter #main article {
        opacity: 0;
        transform: scale(0.94);
        filter: blur(10px);
      }

      html.morph-enter.morph-active #main article {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }

      .hero {
        margin: 0 0 2rem;
      }

      .hero h1 {
        text-align: center;
        margin-top: 1rem;
      }

      .hero img {
        width: 100%;
        display: block;
        border-radius: 0.2rem;
      }

      .toc {
        background: rgba(238, 162, 214, 0.23);
        padding: 0.95rem;
        border-radius: 0.3rem;
      }

      .article-block,
      .item-block {
        margin-top: 1.25rem;
        padding: 1rem;
        border-radius: 0.25rem;
        background: rgba(231, 161, 217, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .article-block h2,
      .item-block h2 {
        margin-bottom: 0.55rem;
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }

      .article-cover,
      .item-cover {
        margin: 0 0 1rem;
      }

      .article-cover img,
      .item-cover img {
        width: 100%;
        display: block;
        border-radius: 0.2rem;
      }

      #main article .article-block p img,
      #main article .item-block p img,
      #main article .article-block > img,
      #main article .item-block > img {
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 0.2rem;
      }

      .article-link,
      .item-link {
        font-size: 0.9rem;
        opacity: 0.85;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding-left: 0;
        margin-left: 0;
      }

      .share-article {
        cursor: pointer;
      }

      #main article ul.socials-icons,
      #main article ul.article-link,
      #main article ul.item-link {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
        margin-left: 0;
        padding-left: 0;
        text-align: center;
      }

      #main article ul.icons li {
        padding: 0;
        margin: 0 0.3rem;
      }

      #main article ul.icons li a,
      #main article .share-article {
        background-color: rgba(238, 162, 214, 0.23);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 25px;
        border-top: 1px solid rgba(158, 157, 157, 0.4);
        border-left: 1px solid rgba(158, 157, 157, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
        color: #ffffff !important;
        width: 3rem;
        height: 3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 3rem;
        font-size: 1.25rem;
        opacity: 0;
        transition: opacity 0.2s ease-in-out, background-color 0.2s ease-in-out,
          border-top-color 0.2s ease-in-out, border-left-color 0.2s ease-in-out;
      }

      #main article.active ul.icons li a,
      #main article.active .share-article,
      body.is-article-visible #main article ul.icons li a,
      body.is-article-visible #main article .share-article {
        opacity: 1;
      }

      #main article ul.icons li a:hover,
      #main article .share-article:hover {
        background-color: rgba(231, 161, 217, 0.2);
        border-top-color: rgba(76, 75, 75, 0.4);
        border-left-color: rgba(176, 75, 75, 0.3);
      }

      #main article ul.icons li a:active,
      #main article .share-article:active {
        background-color: rgba(231, 161, 217, 0.2);
      }

      .share-article.is-copied {
        opacity: 0.6;
      }

      .audio-player {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 15px;
        border-radius: 20px;
        backdrop-filter: blur(8px);
        border-top: 1px solid rgba(158, 157, 157, 0.4);
        border-left: 1px solid rgba(158, 157, 157, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
      }

      .audio-player button {
        background: transparent;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: white;
      }

      .audio-player input[type="range"] {
        flex: 1;
        height: 9px;
        border-radius: 5px;
        -webkit-appearance: none;
        background: linear-gradient(to right, #f06 0%, #f06 0%, #555 0%, #555 100%);
        cursor: pointer;
      }

      .audio-player input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #f06;
        cursor: pointer;
        margin-top: -1px;
      }

      .audio-player input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #f06;
        cursor: pointer;
      }

      .collapsible {
        border-radius: 25px;
        background-color: rgba(158, 157, 157, 0.027);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(158, 157, 157, 0.4);
        border-left: 1px solid rgba(158, 157, 157, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
        color: white;
        cursor: pointer;
        padding: 1px 22px;
        width: 100%;
        text-align: left;
        outline: none;
        font-size: 15px;
      }

      .collapsible.active,
      .collapsible:hover {
        border-radius: 25px;
        background-color: rgba(76, 75, 75, 0.027);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(76, 75, 75, 0.4);
        border-left: 1px solid rgba(176, 75, 75, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
      }

      .collapsible:after {
        content: "\002B";
        color: white;
        font-weight: bold;
        float: right;
        margin-left: 2px;
        flex-shrink: 0;
        transition: transform 0.25s ease, opacity 0.2s ease;
      }

      .collapsible.active:after {
        content: "\2212";
        transform: rotate(180deg);
      }

      .collapse-content {
        display: block;
        padding: 0 36px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
        margin-top: 0.5rem;
        background-color: rgba(0, 0, 0, 0);
      }

      .collapse-content.open {
        max-height: 200rem;
      }

      @media (max-width: 640px) {
        #header .content .inner {
          padding: 1.25rem 1rem;
        }

        #main article {
          padding: 3rem 1rem 0.75rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header id="header">
        <div class="content">
          <div class="inner">
            <h1>{{ site.title }}</h1>
          </div>
        </div>
        {% include nav.html %}
      </header>
      <div id="main">
        <article id="page-content" class="active">
          <a class="close" href="{{ '/' | relative_url }}">Close</a>
          <header class="hero">
            {% if page.hero_image %}
              <img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
            {% endif %}
          </header>
          {{ content }}
        </article>
      </div>
    </div>
    <div id="bg"></div>
    <script>
      const spoilerNodes = document.querySelectorAll("spo");
      spoilerNodes.forEach((node) => {
        node.setAttribute("tabindex", "0");
        node.setAttribute("role", "button");
        node.addEventListener("click", () => node.classList.toggle("revealed"));
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            node.classList.toggle("revealed");
          }
        });
      });

      const collapsibleNodes = document.querySelectorAll(".collapsible");
      collapsibleNodes.forEach((node) => {
        node.addEventListener("click", () => {
          const isOpen = node.classList.toggle("active");
          let content = node.nextElementSibling;
          while (content && !content.classList.contains("collapse-content")) {
            content = content.nextElementSibling;
          }

          if (!content && node.parentElement) {
            content = node.parentElement.nextElementSibling;
            while (content && !content.classList.contains("collapse-content")) {
              content = content.nextElementSibling;
            }
          }

          if (!content) return;

          if (isOpen) {
            content.classList.add("open");
            content.style.maxHeight = `${content.scrollHeight}px`;
          } else {
            content.style.maxHeight = "0px";
            content.classList.remove("open");
          }
        });
      });

      const players = document.querySelectorAll(".audio-player");
      players.forEach((player) => {
        const audio = player.querySelector("audio");
        const playBtn = player.querySelector('[data-audio="play"], #playBtn');
        const progress = player.querySelector('input[type="range"]');
        const timeNode = player.querySelector('[data-audio="time"], #time');
        if (!audio || !playBtn || !progress) return;

        const updateProgressFill = () => {
          const value = Number(progress.value) || 0;
          progress.style.background = `linear-gradient(to right, #f06 0%, #f06 ${value}%, #555 ${value}%, #555 100%)`;
        };

        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60) || 0;
          const secs = Math.floor(seconds % 60) || 0;
          return `${mins}:${String(secs).padStart(2, "0")}`;
        };

        audio.addEventListener("timeupdate", () => {
          if (!audio.duration) return;
          progress.value = (audio.currentTime / audio.duration) * 100;
          updateProgressFill();
          if (timeNode) {
            timeNode.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
          }
        });

        progress.addEventListener("input", () => {
          if (!audio.duration) return;
          audio.currentTime = (Number(progress.value) / 100) * audio.duration;
          updateProgressFill();
        });

        playBtn.addEventListener("click", async () => {
          if (audio.paused) {
            try {
              await audio.play();
              playBtn.textContent = "II";
            } catch (error) {
            }
          } else {
            audio.pause();
            playBtn.textContent = ">";
          }
        });

        updateProgressFill();
      });

      const shareButtons = document.querySelectorAll(".share-article");
      shareButtons.forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.preventDefault();

          const shareHash = button.dataset.shareHash || "";
          const shareUrl = `${window.location.origin}${window.location.pathname}${shareHash}`;

          try {
            if (navigator.clipboard?.writeText) {
              await navigator.clipboard.writeText(shareUrl);
            } else {
              const helper = document.createElement("textarea");
              helper.value = shareUrl;
              helper.setAttribute("readonly", "");
              helper.style.position = "absolute";
              helper.style.left = "-9999px";
              document.body.appendChild(helper);
              helper.select();
              document.execCommand("copy");
              document.body.removeChild(helper);
            }

            button.classList.add("is-copied");
            setTimeout(() => button.classList.remove("is-copied"), 650);
          } catch (error) {
          }
        });
      });

      const mainArticle = document.querySelector("#main article");
      document.addEventListener("click", (event) => {
        if (!mainArticle) return;
        if (event.defaultPrevented) return;
        if (event.button !== 0) return;
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
        if (mainArticle.contains(event.target)) return;
        if (event.target.closest("a, button, input, textarea, select, label")) return;

        window.location.href = "{{ '/' | relative_url }}";
      });

      const rootNode = document.documentElement;
      if (rootNode.classList.contains("morph-enter")) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            rootNode.classList.add("morph-active");
            setTimeout(() => {
              rootNode.classList.remove("morph-enter");
              rootNode.classList.remove("morph-active");
            }, 500);
          });
        });
      }
    </script>
  </body>
</html>

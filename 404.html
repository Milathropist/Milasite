      radial-gradient(circle at 63% 10%, rgba(255, 255, 255, 0.82) 0 1px, transparent 1.8px),
      radial-gradient(circle at 69% 27%, rgba(255, 246, 255, 0.46) 0 0.9px, transparent 1.6px),
      radial-gradient(circle at 76% 14%, rgba(255, 255, 255, 0.92) 0 1px, transparent 1.9px),

  .not-found-game::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(var(--runner-ground-offset) - 0.2rem);
    height: 2.5rem;

  .not-found-game-sky {

    content: "";
    position: absolute;
    pointer-events: none;

    inset: 0;
    background:
      radial-gradient(circle at 13% 36%, rgba(255, 255, 255, 0.55) 0 1px, transparent 2px),
      radial-gradient(circle at 21% 24%, rgba(255, 255, 255, 0.36) 0 0.9px, transparent 1.7px),

  .not-found-game-sky::after {
    inset: -8% -6% 32% -6%;

      radial-gradient(ellipse at 18% 26%, rgba(144, 255, 215, 0.12), rgba(144, 255, 215, 0) 52%),
      radial-gradient(ellipse at 52% 18%, rgba(136, 191, 255, 0.08), rgba(136, 191, 255, 0) 44%),

        rgba(102, 255, 199, 0.1) 22%,

    position: absolute;
    top: 0.75rem;
    left: 0.8rem;
    right: 0.8rem;

    gap: 0.55rem;
    z-index: 4;
    font-family: "Pixelify Sans", "Courier New", monospace;

  .not-found-game-audio-toggle {
    width: 2.95rem;
    height: 2.95rem;

  .not-found-game-scorecard {

    letter-spacing: 0.08em;

    display: block;
    margin-top: 0.1rem;
    color: #fff4ff;
    font-size: 1.15rem;
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .not-found-game-track {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: var(--runner-ground-offset);
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(85, 47, 138, 0.9), rgba(38, 19, 67, 0.98)),
      rgba(25, 13, 49, 0.96);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
  }

  .not-found-game-track::before,
  .not-found-game-track::after {
    content: "";
    position: absolute;
    left: -20%;
    right: -20%;
    background-repeat: repeat-x;
    transform: translateX(var(--runner-track-offset));
  }

  .not-found-game-track::before {
    bottom: 0.95rem;
    height: 2px;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(255, 255, 255, 0.82) 0 1.45rem,
      transparent 1.45rem 2.55rem
    );
    opacity: 0.72;
  }

  .not-found-game-track::after {
    bottom: 0.55rem;
    height: 1px;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(255, 224, 244, 0.72) 0 0.8rem,
      transparent 0.8rem 1.7rem
    );
    opacity: 0.58;
  }

  .not-found-game-obstacles {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .not-found-game-obstacle {
    position: absolute;
    left: 0;
    bottom: calc(var(--runner-ground-offset) - 0.1rem);
    will-change: transform;
    pointer-events: none;
  }

  .not-found-game-obstacle img,
  .not-found-game-dino {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    pointer-events: none;
  }

  .not-found-game-obstacle--ground {
    transform-origin: 50% 100%;
    filter: drop-shadow(0 0.45rem 0.55rem rgba(0, 0, 0, 0.35));
  }

  .not-found-game-obstacle--air {
    transform-origin: 50% 50%;
    filter: drop-shadow(0 0.4rem 0.55rem rgba(0, 0, 0, 0.32));
  }

  .not-found-game-obstacle--air img {
    animation: not-found-plane-bob 0.92s ease-in-out infinite alternate;
  }

  .not-found-game-dino {
    position: absolute;
    left: 2.75rem;
    bottom: calc(var(--runner-ground-offset) - 0.15rem);
    width: 4.65rem;
    height: 4.95rem;
    z-index: 3;
    transform-origin: 50% 100%;
    filter: drop-shadow(0 0.55rem 0.6rem rgba(0, 0, 0, 0.4));
    will-change: transform;
  }

  .not-found-game-dino.is-ducking {
    width: 5.35rem;
    height: 3.28rem;
  }

  .not-found-game-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: linear-gradient(180deg, rgba(12, 10, 23, 0.2), rgba(12, 10, 23, 0.68));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease-in-out;
    z-index: 5;
  }

  .not-found-game-overlay.is-visible {
    opacity: 1;
    pointer-events: auto;
  }

  .not-found-game-overlay-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    padding: 1rem 1.15rem;
    border-radius: 0.65rem;
    background: rgba(15, 10, 29, 0.68);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .not-found-game-overlay-title,
  .not-found-game-overlay-copy {
    margin: 0;
    letter-spacing: 0.06em;
  }

  .not-found-game-overlay-title {
    font-size: 1.45rem;
    color: #ffffff;
  }

  .not-found-game-overlay-copy {
    font-size: 0.92rem;
    color: rgba(255, 255, 255, 0.75);
  }

  .not-found-game .runner-retry-button {
    width: 3.45rem;
    height: 3.45rem;
    font-size: 1.4rem;
  }

  .not-found-game-caption {
    margin: 0.85rem 0 0;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
    color: rgba(255, 255, 255, 0.8);
  }

  .not-found-home .icon.brands.fa-house:before {
    content: "\f015";
    font-family: "Font Awesome 5 Free";
    font-weight: 900;
  }

  @keyframes not-found-plane-bob {
    from {
      transform: translateY(-1px) rotate(-1deg);

    to {
      transform: translateY(2px) rotate(1.5deg);

<section class="item-block not-found-panel">
  <h2>404 page not found</h2>
  <p>The page you tried to open does not exist.</p>
